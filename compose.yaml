services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:15.1.0
    container_name: mailserver
    hostname: ${MAIL_HOSTNAME}
    domainname: ${MAIL_DOMAIN}
    env_file:
      - ./mailserver.env
    environment:
      OVERRIDE_HOSTNAME: ${MAIL_HOSTNAME}
      POSTMASTER_ADDRESS: ${POSTMASTER_ADDRESS}
      TZ: ${TZ}
      SSL_CERT_PATH: /etc/letsencrypt/live/${MAIL_HOSTNAME}/fullchain.pem
      SSL_KEY_PATH: /etc/letsencrypt/live/${MAIL_HOSTNAME}/privkey.pem
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "993:993"
    volumes:
      - ./docker-data/dms/mail-data:/var/mail
      - ./docker-data/dms/mail-state:/var/mail-state
      - ./docker-data/dms/mail-logs:/var/log/mail
      - ./docker-data/dms/config:/tmp/docker-mailserver
      - ./docker-data/dms/config/dovecot-fcm-after.sieve:/usr/lib/dovecot/sieve-global/after/90-fcm-notify.sieve
      - ./scripts/dovecot-fcm-notify.py:/usr/lib/dovecot/sieve-pipe/fcm-notify
      - ./docker-data/dms/config/fcm-hook-secret:/run/secrets/fcm-hook-secret:ro
      - ./docker-data/certbot/certs:/etc/letsencrypt
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: "ss --listening --ipv4 --tcp | grep --silent ':smtp' || exit 1"
      timeout: 3s
      retries: 0
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    stop_grace_period: 1m

  mailadmin:
    build:
      context: ./blocklist-admin
    container_name: mailserver-mailadmin
    environment:
      TZ: ${TZ}
      DATABASE_URL: postgresql://${BLOCKLIST_DB_USER:-mailblocklist}:${BLOCKLIST_DB_PASSWORD:-mailblocklist-dev}@postgis:5432/${BLOCKLIST_DB_NAME:-mailblocklist}
      DJANGO_SECRET_KEY: ${MAILADMIN_SECRET_KEY:-change-me-too}
      DJANGO_ALLOWED_HOSTS: ${MAILADMIN_ALLOWED_HOSTS:-mailadmin.example.com,127.0.0.1,localhost},mailadmin
      DJANGO_CSRF_TRUSTED_ORIGINS: ${MAILADMIN_CSRF_TRUSTED_ORIGINS:-https://mailadmin.example.com}
      DJANGO_SUPERUSER_USERNAME: ${MAILADMIN_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${MAILADMIN_SUPERUSER_PASSWORD:-change-me}
      DJANGO_SUPERUSER_EMAIL: ${MAILADMIN_SUPERUSER_EMAIL:-admin@example.com}
      MAILADMIN_HOST: ${MAILADMIN_HOST:-mailadmin.example.com}
      BLOCKLIST_CONFIG_PATH: /app/shared-config/postfix-sender-blocklist
      MAILSERVER_CONTAINER_NAME: mailserver
      MAILBOX_AUTO_CREATE_FROM_USER_ADMIN: ${MAILBOX_AUTO_CREATE_FROM_USER_ADMIN:-false}
      MAILBOX_AUTO_CREATE_SKIP_STAFF: ${MAILBOX_AUTO_CREATE_SKIP_STAFF:-true}
      BLOCKLIST_REJECT_MESSAGE: Blocked by local policy
      MAIL_NOTIFY_HOOK_SECRET: ${MAIL_NOTIFY_HOOK_SECRET}
      DEVICE_REGISTRATION_SECRET: ${DEVICE_REGISTRATION_SECRET}
      MAILBOX_CREDENTIAL_ENCRYPTION_KEY: ${MAILBOX_CREDENTIAL_ENCRYPTION_KEY}
      MAIL_IMAP_HOST: ${MAIL_HOSTNAME}
      MAIL_SMTP_HOST: ${MAIL_HOSTNAME}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-adminsdk.json
    ports:
      - "127.0.0.1:8081:8000"
    volumes:
      - ./docker-data/dms/config:/app/shared-config
      - ./docker-data/secrets/firebase-adminsdk.json:/run/secrets/firebase-adminsdk.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
      - postgis
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.mailadmin.rule=Host(`${MAILADMIN_HOST}`)
      - traefik.http.routers.mailadmin.entrypoints=websecure
      - traefik.http.routers.mailadmin.tls=true
      - traefik.http.routers.mailadmin.tls.certresolver=cloudflare
      - traefik.http.services.mailadmin.loadbalancer.server.port=8000
    depends_on:
      mailserver:
        condition: service_started
    restart: unless-stopped

  mailindex-sync:
    build:
      context: ./blocklist-admin
    container_name: mailserver-mailindex-sync
    command:
      - python
      - manage.py
      - run_mail_index_sync_cycle
      - --loop
      - --interval-seconds
      - ${MAIL_INDEX_SYNC_INTERVAL_SECONDS:-600}
    environment:
      TZ: ${TZ}
      DATABASE_URL: postgresql://${BLOCKLIST_DB_USER:-mailblocklist}:${BLOCKLIST_DB_PASSWORD:-mailblocklist-dev}@postgis:5432/${BLOCKLIST_DB_NAME:-mailblocklist}
      DJANGO_SECRET_KEY: ${MAILADMIN_SECRET_KEY:-change-me-too}
      DJANGO_ALLOWED_HOSTS: ${MAILADMIN_ALLOWED_HOSTS:-mailadmin.example.com,127.0.0.1,localhost},mailadmin
      DJANGO_CSRF_TRUSTED_ORIGINS: ${MAILADMIN_CSRF_TRUSTED_ORIGINS:-https://mailadmin.example.com}
      MAILADMIN_HOST: ${MAILADMIN_HOST:-mailadmin.example.com}
      BLOCKLIST_CONFIG_PATH: /app/shared-config/postfix-sender-blocklist
      MAILSERVER_CONTAINER_NAME: mailserver
      BLOCKLIST_REJECT_MESSAGE: Blocked by local policy
      MAIL_NOTIFY_HOOK_SECRET: ${MAIL_NOTIFY_HOOK_SECRET}
      DEVICE_REGISTRATION_SECRET: ${DEVICE_REGISTRATION_SECRET}
      MAILBOX_CREDENTIAL_ENCRYPTION_KEY: ${MAILBOX_CREDENTIAL_ENCRYPTION_KEY}
      MAIL_IMAP_HOST: ${MAIL_HOSTNAME}
      MAIL_SMTP_HOST: ${MAIL_HOSTNAME}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-adminsdk.json
      MAIL_INDEX_SYNC_INTERVAL_SECONDS: ${MAIL_INDEX_SYNC_INTERVAL_SECONDS:-600}
      MAIL_INDEX_SYNC_STALE_AFTER_SECONDS: ${MAIL_INDEX_SYNC_STALE_AFTER_SECONDS:-600}
      MAIL_INDEX_SYNC_FAILURE_COOLDOWN_SECONDS: ${MAIL_INDEX_SYNC_FAILURE_COOLDOWN_SECONDS:-1800}
      MAIL_INDEX_SYNC_MAX_ACCOUNTS: ${MAIL_INDEX_SYNC_MAX_ACCOUNTS:-50}
      MAIL_INDEX_SYNC_LIMIT: ${MAIL_INDEX_SYNC_LIMIT:-500}
    volumes:
      - ./docker-data/dms/config:/app/shared-config
      - ./docker-data/secrets/firebase-adminsdk.json:/run/secrets/firebase-adminsdk.json:ro
    networks:
      - default
      - postgis
    depends_on:
      mailserver:
        condition: service_started
      mailadmin:
        condition: service_started
    restart: unless-stopped

networks:
  postgis:
    external: true
  proxy:
    external: true
